services:
  app:
    image: relab-rpi-cam-plugin
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8018:8018"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /run/udev:/run/udev:ro
      - app_logs:/app/logs
      - relay_credentials:/home/rpicam/.config/relab
    env_file:
      - .env
    group_add:
      - video
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:2024.11.1
    restart: unless-stopped
    env_file:
      - .env
    command: tunnel --no-autoupdate run
    profiles:
      # Only run when explicitly specified
      - cloudflared
    pull_policy: always

  alloy:
    image: grafana/alloy:v1.12.0
    restart: unless-stopped
    command:
      - run
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    environment:
      LOKI_PUSH_URL: ${LOKI_PUSH_URL:-}
      PROMETHEUS_REMOTE_WRITE_URL: ${PROMETHEUS_REMOTE_WRITE_URL:-}
      OBSERVABILITY_INSTANCE: ${OBSERVABILITY_INSTANCE:-rpi-cam-plugin}
    volumes:
      - ./config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - app_logs:/var/log/app:ro
    profiles:
      - observability-ship

volumes:
  app_logs:
  relay_credentials:
  alloy_data:
