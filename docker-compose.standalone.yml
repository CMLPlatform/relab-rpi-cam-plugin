# Standalone mode for the RPi camera plugin — no Relab backend involved.
#
# Runs the plugin + its MediaMTX sidecar + a MinIO sidecar on the same host
# network. Captures land directly in the ``rpi-cam`` MinIO bucket via the
# Phase 10 ``S3CompatibleSink``. Live preview works exactly the same as in
# paired mode (LL-HLS from MediaMTX through the Pi's own /hls proxy); YouTube
# streaming also works if you configure a stream key.
#
# To use this file instead of the default ``compose.yml``:
#
#     cp .env.standalone.example .env.standalone
#     # edit .env.standalone — at minimum set MINIO_ROOT_PASSWORD
#     docker compose -f docker-compose.standalone.yml --env-file .env.standalone up -d
#
# Once up:
#   - Camera API at http://<pi-lan-ip>:8018
#   - MinIO console at http://<pi-lan-ip>:9001 (login with MINIO_ROOT_USER / MINIO_ROOT_PASSWORD)
#   - Captures browsable under http://<pi-lan-ip>:9000/rpi-cam/
#
# Retention policies + access logs live on the MinIO bucket, not in the plugin.
# Configure them via the MinIO console or ``mc`` CLI as needed.

services:
  app:
    image: relab-rpi-cam-plugin-standalone
    build:
      context: .
      dockerfile: Dockerfile
      # Install the ``[s3]`` extra so ``S3CompatibleSink`` has its runtime dep
      # (``aioboto3``). The default compose.yml omits this build arg and ships
      # a leaner image that only speaks to the Relab backend.
      args:
        IMAGE_SINK_EXTRA: s3
    restart: unless-stopped
    ports:
      - "8018:8018"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /run/udev:/run/udev:ro
      - app_logs:/app/logs
      - standalone_queue:/app/data/queue
    env_file:
      - .env.standalone
    environment:
      # Explicitly pick the S3 sink — auto-inference would also find it via
      # ``s3_endpoint_url``, but being explicit here makes the intent obvious
      # to anyone reading docker compose ps / inspect.
      IMAGE_SINK: s3
      # Pairing is explicitly disabled: ``BackendPushSink`` would never be used.
      PAIRING_BACKEND_URL: ""
    group_add:
      - video
    depends_on:
      minio-init:
        condition: service_completed_successfully
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  mediamtx:
    image: bluenviron/mediamtx:1.12.0-ffmpeg
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    # S3-compatible object storage. Runs on the same LAN as the Pi; the app
    # hits it via ``host.docker.internal:9000`` using the extra_hosts bridge.
    # The ``--console-address`` flag pins the web UI to 9001 (default
    # behaviour is random high port, which makes docs awkward).
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env.standalone}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  minio-init:
    # One-shot init container: creates the rpi-cam bucket on first boot.
    # Uses the MinIO ``mc`` CLI baked into the same image as a simple
    # alternative to running a second image just for init.
    image: minio/mc:RELEASE.2024-12-17T01-20-34Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env.standalone}
      BUCKET_NAME: ${S3_BUCKET:-rpi-cam}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing local/$$BUCKET_NAME;
      echo 'standalone bucket ready: '$$BUCKET_NAME;
      "
    restart: "no"

volumes:
  app_logs:
  standalone_queue:
  minio_data:
