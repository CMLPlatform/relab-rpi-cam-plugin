name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Do not cancel in-progress releases
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # commitizen needs full history to find the last tag

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          set +e
          uv run cz bump --yes 2>&1
          exit_code=$?
          if [ $exit_code -eq 21 ]; then
            echo "No commits trigger a version bump, skipping release."
            echo "bumped=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          [ $exit_code -ne 0 ] && exit $exit_code
          echo "bumped=true" >> $GITHUB_OUTPUT
          echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Push version bump and tag
        if: steps.bump.outputs.bumped == 'true'
        run: git push --follow-tags

      - name: Create GitHub release
        if: steps.bump.outputs.bumped == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.bump.outputs.tag }}" --title "${{ steps.bump.outputs.tag }}" --generate-notes
