name: relab-rpi-cam-models Checks (reusable)

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.13"
      runs_on:
        required: false
        type: string
        default: "ubuntu-24.04"
      upload_artifact:
        required: false
        type: boolean
        default: false
      artifact_name:
        required: false
        type: string
        default: "relab-rpi-cam-models-dist"

permissions:
  contents: read

jobs:
  models-check:
    name: relab-rpi-cam-models Checks
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Ruff check
        run: uv run ruff check --no-fix relab_rpi_cam_models/src/relab_rpi_cam_models tests/unit/core/test_contract_package.py

      - name: Ruff format check
        run: uv run ruff format --check relab_rpi_cam_models/src/relab_rpi_cam_models tests/unit/core/test_contract_package.py

      - name: Run contract package tests
        run: uv run pytest tests/unit/core/test_contract_package.py -q

      - name: Build package
        run: uv build --package relab-rpi-cam-models --out-dir dist/relab-rpi-cam-models --clear

      - name: Smoke test built wheel in an isolated env
        run: |
          set -euo pipefail
          uv run \
            --isolated \
            --no-project \
            --with dist/relab-rpi-cam-models/*.whl \
            python - <<'PY'
          from relab_rpi_cam_models import PairingPollResponse, PairingStatus

          assert PairingPollResponse.waiting().status is PairingStatus.WAITING
          PY

      - name: Upload package artifacts
        if: inputs.upload_artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/relab-rpi-cam-models/*
          retention-days: 7
