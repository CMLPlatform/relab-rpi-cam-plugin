name: Test (reusable)

on:
  workflow_call:
    inputs:
      python_version:
        required: false
        type: string
        default: "3.13"
      runs_on:
        required: false
        type: string
        default: "ubuntu-24.04"

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ${{ inputs.runs_on }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run pytest --cov=app --cov=relab_rpi_cam_models --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 7
