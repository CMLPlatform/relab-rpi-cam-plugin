name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    uses: ./.github/workflows/lint-reusable.yml
    with:
      python_version: ${{ env.PYTHON_VERSION }}

  test:
    uses: ./.github/workflows/test-reusable.yml
    with:
      python_version: ${{ env.PYTHON_VERSION }}

  audit:
    uses: ./.github/workflows/audit-reusable.yml
    with:
      python_version: ${{ env.PYTHON_VERSION }}
