name: Publish relab-rpi-cam-models

on:
  push:
    tags:
      - "relab-rpi-cam-models-v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-tag:
    name: Validate package tag
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify tag matches package version
        run: python scripts/validate_models_package_tag.py "${{ github.ref_name }}"

  build:
    needs: validate-tag
    uses: ./.github/workflows/models-check-reusable.yml
    with:
      python_version: "3.13"
      upload_artifact: true
      artifact_name: relab-rpi-cam-models-dist

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/relab-rpi-cam-models
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: relab-rpi-cam-models-dist
          path: dist/relab-rpi-cam-models

      - name: Publish distribution
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/relab-rpi-cam-models

  verify-published-package:
    name: Verify published package install
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Verify published relab-rpi-cam-models install
        env:
          MODELS_VERSION: "${{ github.ref_name }}"
        run: |
          set -euo pipefail
          VERSION="${MODELS_VERSION#relab-rpi-cam-models-v}"
          python -m venv .venv-models-smoke
          . .venv-models-smoke/bin/activate
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if python -m pip install "relab-rpi-cam-models==${VERSION}"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep 5
          done
          python - <<'PY'
          from relab_rpi_cam_models import (
              LocalAccessInfo,
              PairingPollResponse,
              PairingStatus,
              RelayCommandEnvelope,
              RelayMessageType,
          )

          assert PairingPollResponse.waiting().status is PairingStatus.WAITING
          local_access = LocalAccessInfo(
              local_api_key="k",
              candidate_urls=["http://pi.local:8018"],
              mdns_name=None,
          )
          assert local_access.candidate_urls == ["http://pi.local:8018"]
          relay_command = RelayCommandEnvelope(
              id="req-1",
              type=RelayMessageType.REQUEST,
              method="GET",
              path="/healthz",
          )
          assert relay_command.model_dump()["path"] == "/healthz"
          PY
