name: Publish relab-rpi-cam-models

on:
  push:
    tags:
      - "relab-rpi-cam-models-v*.*.*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  ARTIFACT_NAME: "relab-rpi-cam-models-dist"

jobs:
  validate-tag:
    name: Validate package tag
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify tag matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag_name = os.environ["TAG_NAME"]
          prefix = "relab-rpi-cam-models-v"
          if not tag_name.startswith(prefix):
              raise SystemExit(f"Unexpected tag name: {tag_name}")

          tag_version = tag_name.removeprefix(prefix)
          package_version = tomllib.loads(
              Path("relab_rpi_cam_models/pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]

          if tag_version != package_version:
              raise SystemExit(
                  f"Tag version {tag_version} does not match relab_rpi_cam_models version {package_version}"
              )

          print(f"Validated {tag_name} against relab_rpi_cam_models {package_version}")
          PY

  build:
    needs: validate-tag
    uses: ./.github/workflows/models-check-reusable.yml
    with:
      python_version: "3.13"
      upload_artifact: true
      artifact_name: relab-rpi-cam-models-dist

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/relab-rpi-cam-models
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: dist/relab-rpi-cam-models

      - name: Publish distribution
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/relab-rpi-cam-models
