# Codecov configuration
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    project:
      default:
        threshold: 2%
        if_not_found: success
        if_ci_failed: error
    patch:
      default:
        threshold: 2%
        if_not_found: success
        if_ci_failed: error

comment:
  layout: "reach,diff,files"
  behavior: default
  require_changes: true

github_checks:
  annotations: false
