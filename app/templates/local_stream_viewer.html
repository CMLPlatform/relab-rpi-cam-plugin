{% extends "base.html" %}

{% block title %}Local HLS Stream Viewer{% endblock %}

{% block extra_scripts %}
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
{% endblock %}

{% block body %}
<div class="video-container">
      <video id="video" class="video-element" controls muted></video>
      <div class="video-controls">
        <button onclick="startStream()" class="btn">Start Stream</button>
        <button onclick="stopStream()" class="btn">Stop Stream</button>
        <div id="status"></div>
      </div>
    </div>
    <script>
      const video = document.getElementById('video')
      const statusDiv = document.getElementById('status')

      let hlsPlayer = null

      function initPlayer() {
        if (!Hls.isSupported()) return
        hlsPlayer?.destroy()
        hlsPlayer = new Hls()
        hlsPlayer.loadSource('/stream/hls', { method: 'GET', credentials: 'include' })
        hlsPlayer.attachMedia(video)
        hlsPlayer.on(Hls.Events.MANIFEST_PARSED, () => video.play())
      }

      async function checkStreamStatus() {
        try {
          const response = await fetch('/camera/status', { method: 'GET', credentials: 'include' })
          const status = await response.json()
          return status.stream.mode === 'local'
        } catch {
          return false
        }
      }

      async function waitForStream(maxWaitMs = 15000, intervalMs = 500) {
        const deadline = Date.now() + maxWaitMs
        while (Date.now() < deadline) {
          try {
            const resp = await fetch('/stream/status', { credentials: 'include' })
            if (resp.ok) return true
          } catch { /* not ready yet */ }
          await new Promise(r => setTimeout(r, intervalMs))
        }
        return false
      }

      async function startStream() {
        if (await checkStreamStatus()) {
          statusDiv.innerHTML = 'Stream is already active'
          return
        }
        try {
          const response = await fetch('/stream/start?mode=local', { method: 'POST', credentials: 'include' })
          if (!response.ok) throw new Error()
          statusDiv.innerHTML = 'Starting stream...'
          const ready = await waitForStream()
          if (ready) {
            statusDiv.innerHTML = 'Stream active'
            initPlayer()
          } else {
            statusDiv.innerHTML = 'Stream did not start in time'
          }
        } catch {
          statusDiv.innerHTML = 'Failed to start stream'
        }
      }

      async function stopStream() {
        if (!(await checkStreamStatus())) {
          statusDiv.innerHTML = 'No active stream to stop'
          return
        }
        try {
          await fetch('/stream/stop?mode=local', { method: 'DELETE', credentials: 'include' })
          hlsPlayer?.destroy()
          hlsPlayer = null
          video.pause()
          video.src = ''
          statusDiv.innerHTML = 'Stream stopped'
        } catch {
          statusDiv.innerHTML = 'Failed to stop stream'
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        if (await checkStreamStatus()) {
          statusDiv.innerHTML = 'Stream active'
          initPlayer()
        } else {
          statusDiv.innerHTML = 'No active stream'
        }
      })
    </script>
{% endblock %}
