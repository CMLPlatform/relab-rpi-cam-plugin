{% extends "base.html" %}

{% block title %}YouTube Stream Viewer{% endblock %}

{% block body %}
<div class="video-container">
      <div id="player" class="video-element"></div>
      <div class="video-controls">
        <button onclick="startStream()" class="btn">Start Stream</button>
        <button onclick="stopStream()" class="btn">Stop Stream</button>
        <div id="status"></div>
      </div>
    </div>
    <div id="config" data-embed-url="{{ embed_url | e }}"></div>
    <script>
      const playerDiv = document.getElementById('player')
      const statusDiv = document.getElementById('status')
      const embedUrl = document.getElementById('config').dataset.embedUrl

      async function checkStreamStatus() {
        try {
          const response = await fetch('/camera', { credentials: 'include' })
          const status = await response.json()
          return status.stream?.mode === 'youtube' && Boolean(status.stream?.url)
        } catch {
          return false
        }
      }

      function createPlayer() {
        if (!embedUrl) {
          statusDiv.innerHTML = 'Stream URL unavailable'
          return
        }
        playerDiv.innerHTML = `
          <iframe src="${embedUrl}?autoplay=1"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
          </iframe>`
      }

      async function startStream() {
        if (await checkStreamStatus()) {
          statusDiv.innerHTML = 'Stream is already active'
          return
        }
        statusDiv.innerHTML = 'Please start YouTube stream from camera controls using the API.'
      }

      async function stopStream() {
        if (!(await checkStreamStatus())) {
          statusDiv.innerHTML = 'No active stream to stop'
          return
        }
        try {
          await fetch('/stream', { method: 'DELETE', credentials: 'include' })
          playerDiv.innerHTML = ''
          statusDiv.innerHTML = 'Stream stopped'
        } catch {
          statusDiv.innerHTML = 'Failed to stop stream'
        }
      }

      document.addEventListener('DOMContentLoaded', async () => {
        if (await checkStreamStatus()) {
          createPlayer()
          statusDiv.innerHTML = 'Stream active'
        } else {
          statusDiv.innerHTML = 'No active stream'
        }
      })
    </script>
{% endblock %}
