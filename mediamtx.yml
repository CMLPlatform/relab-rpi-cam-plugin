# MediaMTX config for the RPi camera plugin.
#
# MediaMTX is the single media seam for everything the plugin does with H264
# video. Flows:
#
#   picamera2 (lores 640x480, ~500kbps) ──RTSP──▶ mediamtx:cam-preview
#                                                      │
#                                                      ├── LL-HLS to browsers (:8888)
#                                                      └── (native clients get the same HLS URL)
#
#   picamera2 (main 1920x1080, ~4Mbps)  ──RTSP──▶ mediamtx:cam-hires
#                                                      │
#                                                      └── RTMPS to YouTube
#                                                          (configured at runtime via
#                                                          MediaMTX's API on :9997 when
#                                                          the user starts a stream)
#
# The container runs ``network_mode: host`` so the LL-HLS port (8888) is
# reachable from whatever process proxies segments to the browser (the backend
# via the WebSocket relay, or the browser directly when on the same LAN).
#
# No auth configured — MediaMTX listens on the trusted host network only. The
# runtime API is localhost-bound. The plugin API controls YouTube egress via
# that localhost API, never over the public network.

logLevel: info
logDestinations: [stdout]

# Turn off listeners we don't use. WebRTC / RTMP / SRT aren't needed: the only
# preview surface is LL-HLS. RTMP would be the YouTube ingest target normally,
# but we don't terminate RTMP *ourselves* — MediaMTX originates an outbound
# RTMPS connection to YouTube via its path ``runOnReady`` (configured at
# runtime).
rtmp: no
webrtc: no
srt: no
playback: no
metrics: no

# RTSP ingest — the Pi app publishes lores (always) and main (while streaming).
rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp]

# LL-HLS output — the single browser/native preview surface.
# - ``hlsVariant: lowLatency`` enables the LL-HLS extensions (CMAF fragments +
#   HTTP/1.1 chunked transfer) for ~1-2s glass-to-glass.
# - ``hlsSegmentCount: 7`` + ``hlsSegmentDuration: 200ms`` gives a ~1.4s buffer
#   at the player, which is the sweet spot for LL-HLS without starving players
#   that stall briefly on network blips.
# - ``hlsAllowOrigin: '*'`` is fine because the HLS server only listens on the
#   trusted host network; the actual browser origin is the backend proxy.
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 200ms
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsAllowOrigin: '*'

# Runtime control API — the plugin's ``mediamtx_client`` uses this to add/remove
# the YouTube egress on the ``cam-hires`` path when the user starts/stops a
# stream. Bound to all interfaces so the ``app`` container can reach it via
# ``host.docker.internal`` (Docker bridge gateway → host). Access from outside
# the Pi's local network is blocked at the router level.
api: yes
apiAddress: :9997

pathDefaults:
  # Accept publish attempts from anywhere on the trusted host network.
  source: publisher
  sourceOnDemand: no
  # Don't record any streams to disk — captures live in the backend / S3, not
  # on the Pi's SD card.
  record: no

paths:
  cam-preview:
    # Lores preview stream. Published by the Pi app at startup and kept running
    # for the lifetime of the process. At ~500kbps and ~3% CPU the encoder is
    # cheap enough that ref counting it would be more ceremony than savings.
  cam-hires:
    # Full-resolution stream, published by the Pi app only while a YouTube
    # stream is active. The YouTube RTMPS target is patched in at runtime via
    # the MediaMTX API (``POST /v3/config/paths/patch/cam-hires`` with a
    # ``runOnReady`` entry) so we don't bake secrets into this config file.
