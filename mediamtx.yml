# MediaMTX minimal config for RPi plugin. Run the service with
# `network_mode: host` so localhost listeners are reachable from the app.

logLevel: info
logDestinations: [stdout]
udpMaxPayloadSize: 1472

# Disable unused protocols
rtmp: no
webrtc: no
srt: no
playback: no
metrics: no

# RTSP ingest
rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp]

# Browser/native preview HLS. Standard HLS is a little less aggressive than
# LL-HLS, but it avoids MediaMTX's variable part-duration warnings that break
# playback on iOS clients when the preview stream cadence jitters slightly.
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: mpegts
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsSegmentMaxSize: 50M
hlsAllowOrigins: ['*']

# Local control API (app reaches this on 127.0.0.1:9997)
api: yes
apiAddress: 127.0.0.1:9997

pathDefaults:
  source: publisher
  sourceOnDemand: no
  record: no

paths:
  cam-preview: {}
  cam-hires: {}
