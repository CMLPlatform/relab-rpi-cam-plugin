# MediaMTX minimal config for RPi plugin. Run the service with
# `network_mode: host` so localhost listeners are reachable from the app.

logLevel: info
logDestinations: [stdout]

# Disable unused protocols
rtmp: no
webrtc: no
srt: no
playback: no
metrics: no

# RTSP ingest
rtsp: yes
rtspAddress: :8554
rtspTransports: [tcp]

# LL-HLS preview (low-latency)
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 200ms
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50M
hlsAllowOrigin: '*'

# Local control API (app reaches this on 127.0.0.1:9997)
api: yes
apiAddress: 127.0.0.1:9997

pathDefaults:
  source: publisher
  sourceOnDemand: no
  record: no

paths:
  cam-preview: {}
  cam-hires: {}
